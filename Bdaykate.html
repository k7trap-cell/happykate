<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>🎂 Carte Ultime</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  overflow: hidden;
  background: linear-gradient(270deg, pink, hotpink, deeppink, violet, purple);
  background-size: 1000% 1000%;
  animation: rainbow 12s ease infinite;
}

@keyframes rainbow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 10px 35px rgba(0,0,0,0.4);
}

h1 {
  color: deeppink;
  font-size: 2.2em;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

h2 {
  color: violet;
  font-size: 1.5em;
  margin-top: 10px;
  animation: dance 1s infinite alternate;
  display: none;
}

@keyframes dance {
  from { transform: rotate(-2deg); }
  to { transform: rotate(2deg); }
}

button {
  background: deeppink;
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 15px;
}

.balloon {
  position: absolute;
  bottom: -100px;
  width: 40px;
  height: 50px;
  border-radius: 50%;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp { to { transform: translateY(-120vh); } }

.confetti, .firework { position: absolute; width: 6px; height: 6px; border-radius: 50%; }

</style>
</head>
<body>

<div class="card">
  <h1>🎂 З Днем Народження, Моя Любов! ❤️</h1>
  <h2 id="msg">Бажаю тобі року, повного успіху і щастя! 💖</h2>
  <button id="playButton">▶️ Play la musique + surprise</button>
</div>

<!-- Ton MP3 local -->
<audio id="music" src="BadBunny-DtMF.mp3"></audio>

<script>
// Référence à l'audio
let music = document.getElementById("music");

// Bouton play
document.getElementById("playButton").addEventListener("click", () => {
  // Masquer le bouton
  document.getElementById("playButton").style.display = "none";
  
  // Afficher le message romantique
  document.getElementById("msg").style.display = "block";

  // Commencer la musique à 1:23 (83s)
  music.currentTime = 83;
  music.play();

  // Animations
  for (let i = 0; i < 30; i++) setTimeout(createBalloon, i * 200);
  setInterval(createConfetti, 100);
  setInterval(createFirework, 800);
});

// 🎈 Ballons
function createBalloon() {
  let b = document.createElement("div");
  b.className = "balloon";
  b.style.left = Math.random() * 100 + "vw";
  b.style.background = "hsl(" + Math.random() * 360 + ",70%,60%)";
  document.body.appendChild(b);
  setTimeout(() => explode(b), 3000);
}

function explode(b) {
  for (let i = 0; i < 12; i++) {
    let p = document.createElement("div");
    p.className = "confetti";
    p.style.background = b.style.background;
    p.style.left = b.offsetLeft + "px";
    p.style.top = b.offsetTop + "px";
    document.body.appendChild(p);
    let a = Math.random() * 2 * Math.PI;
    let d = Math.random() * 120;
    p.animate([{ transform: "translate(0,0)" }, { transform: `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)` }], { duration: 700 });
    setTimeout(() => p.remove(), 700);
  }
  b.remove();
}

// 🎉 Confettis
function createConfetti() {
  let c = document.createElement("div");
  c.className = "confetti";
  c.style.left = Math.random() * 100 + "vw";
  c.style.top = "-10px";
  c.style.background = "hsl(" + Math.random() * 360 + ",70%,60%)";
  document.body.appendChild(c);
  c.animate([{ transform: "translateY(0)" }, { transform: "translateY(100vh)" }], { duration: 3000 });
  setTimeout(() => c.remove(), 3000);
}

// 🎆 Feu d’artifice
function createFirework() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight / 2;
  for (let i = 0; i < 20; i++) {
    let f = document.createElement("div");
    f.className = "firework";
    f.style.left = x + "px";
    f.style.top = y + "px";
    f.style.background = "hsl(" + Math.random() * 360 + ",70%,60%)";
    document.body.appendChild(f);
    let a = Math.random() * 2 * Math.PI;
    let d = Math.random() * 150;
    f.animate([{ transform: "translate(0,0)" }, { transform: `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)` }], { duration: 800 });
    setTimeout(() => f.remove(), 800);
  }
}
</script>

</body>
</html>
